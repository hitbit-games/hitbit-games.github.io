<script>
// localStorage shim - must run first before any game code
(function(){
  var _m={};
  try{ localStorage.setItem('__t__','1'); localStorage.removeItem('__t__'); }
  catch(e){
    window.localStorage={
      getItem:function(k){return _m.hasOwnProperty(k)?_m[k]:null;},
      setItem:function(k,v){_m[k]=String(v);},
      removeItem:function(k){delete _m[k];},
      clear:function(){_m={};}
    };
  }
})();
</script>

  <script>
window.HitBitGlobal={

<body>

<a id="homeBtn" href="#" onclick="window.parent.postMessage({type:'HB_NAVIGATE',url:'/'},'*');return false;">
  <img src="https://hitbit-code.github.io/favicon.ico" alt="Logo">
  HitBit
</a>

<div id="startScreen">
  <div id="startBadge">
    <div id="startLogo">
      <img src="https://hitbit-code.github.io/favicon.ico" alt="Logo">
    </div>
  </div>
  <div id="startTitle">HitBit Stack</div>
  <div id="startSubtitle">Precision Stacking</div>
  <button class="neon-button" onclick="startGame()" ontouchstart="startGame()">Initialize Game</button>
</div>

<div id="ui">
  <div id="scoreRow">
    <div id="score">0</div>
    <div id="height">0 ft</div>
  </div>
  <canvas id="heartsCanvas" width="90" height="30"></canvas>
</div>

<div id="endScreen">
  <div id="endCard">
    <h1>GAME OVER</h1>
    <div id="stats"></div>
    <br>
    <button class="retry-btn" onclick="resetGame()" ontouchstart="resetGame()">Try Again</button>
  </div>
</div>

<canvas id="game"></canvas>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  if (type === "drop") osc.frequency.value = 200;
  if (type === "cut") osc.frequency.value = 400;
  if (type === "fail") osc.frequency.value = 90;
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.25);
}

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const heartsCanvas = document.getElementById("heartsCanvas");
const heartsCtx = heartsCanvas.getContext("2d");
const scoreEl = document.getElementById("score");
const heightEl = document.getElementById("height");

const WIDTH = 400;
const HEIGHT = 600;
const BLOCK_H = 30;
const DEPTH = 10;
const FEET_PER_BLOCK = 3;

canvas.width = WIDTH;
canvas.height = HEIGHT;

let stack = [], current, fallingBlocks = [];
let score = 0, lives = 3, gameOver = false, endingScroll = false;
let speed = 3, direction = 1, cameraY = 0, targetCameraY = 0;
// RESTORED: Initial hue to dark blue
let hue = 160; 
let accuracyList = [];
let sessionScores = [];
let sessionAccuracies = [];
let zoom = 1, lastTime = 0;
let animationId;
let failedDrops = 0;
let perfectPlacements = 0;
let runStartedAt = 0;
let runEventLog = "";

function startGame() {
  document.getElementById("startScreen").style.opacity = "0";
  setTimeout(() => {
    document.getElementById("startScreen").style.display = "none";
    resetGame();
  }, 500);
}

function drawHearts() {
  heartsCtx.clearRect(0, 0, 90, 30);
  for (let i = 0; i < lives; i++) {
    let x = 10 + i * 28, y = 15;
    heartsCtx.fillStyle = "#ff3355";
    heartsCtx.shadowBlur = 10;
    heartsCtx.shadowColor = "#ff3355";
    heartsCtx.beginPath();
    heartsCtx.moveTo(x, y);
    heartsCtx.bezierCurveTo(x, y - 8, x - 10, y - 8, x - 10, y);
    heartsCtx.bezierCurveTo(x - 10, y + 10, x, y + 14, x, y + 18);
    heartsCtx.bezierCurveTo(x, y + 14, x + 10, y + 10, x + 10, y);
    heartsCtx.bezierCurveTo(x + 10, y - 8, x, y - 8, x, y);
    heartsCtx.fill();
  }
}

function resetGame() {
  if (animationId) cancelAnimationFrame(animationId);
  stack = []; 
  // RETAINED FIX: Clear falling pieces on reset
  fallingBlocks = []; 
  score = 0; 
  lives = 3;
  drawHearts();
  accuracyList = []; 
  gameOver = false; 
  endingScroll = false;
  failedDrops = 0;
  perfectPlacements = 0;
  runStartedAt = Date.now();
  runEventLog = "";
  window.HitBitGlobal?.startSession("stack");
  // RETAINED FIX: Reset speed/direction
  speed = 3; 
  direction = 1; 
  cameraY = 0; 
  targetCameraY = 0;
  // RESTORED: Reset hue to start of gradient
  hue = 160; 
  zoom = 1; 
  lastTime = performance.now();
  document.getElementById("endScreen").style.display = "none";
  stack.push({ x: 100, y: HEIGHT - 100, w: 200, h: BLOCK_H, hue: hue });
  scoreEl.textContent = score;
  heightEl.textContent = "0 ft";
  spawnBlock();
  animationId = requestAnimationFrame(loop);
}

function spawnBlock() {
  const top = stack[stack.length - 1];
  
  // RESTORED: hue cycle between 160 (blue) and 200 (green)
  hue += 6; 
  if (hue > 200) hue = 160; 
  
  current = { x: 0, y: top.y - BLOCK_H, w: top.w, h: BLOCK_H, hue: hue };
}

function drop() {
  if (gameOver || document.getElementById("startScreen").style.display !== "none") return;
  const top = stack[stack.length - 1];
  const diff = current.x - top.x;
  const overlap = current.w - Math.abs(diff);

  if (overlap <= 0) {
    lives--; 
    failedDrops++;
    runEventLog += "M";
    drawHearts(); 
    playSound("fail");
    fallingBlocks.push({ x: current.x, y: current.y, w: current.w, h: current.h, vy: 2, rot: 0, vr: (Math.random() - 0.5) * 0.2, hue: current.hue });
    if (lives <= 0) { startEndingScroll(); return; }
    spawnBlock(); 
    return;
  }

  accuracyList.push(overlap / current.w);
  if (overlap === current.w) {
    perfectPlacements++;
    runEventLog += "P";
  } else {
    runEventLog += "H";
  }
  const sliceW = Math.abs(diff);
  if (sliceW > 0) {
    const sliceX = diff > 0 ? current.x + overlap : top.x - sliceW;
    fallingBlocks.push({ x: sliceX, y: current.y, w: sliceW, h: current.h, vy: 2, rot: 0, vr: (Math.random() - 0.5) * 0.25, hue: current.hue });
    current.w = overlap;
    current.x = diff > 0 ? current.x : top.x;
  }

  score += 1;
  // Difficulty curve retained
  if (score % 5 === 0) speed += 0.3; 
  stack.push({ ...current });
  scoreEl.textContent = score;
  heightEl.textContent = `${stack.length * FEET_PER_BLOCK} ft`;
  playSound("cut");
  spawnBlock();
}

function startEndingScroll() {
  gameOver = true; endingScroll = true;
  targetCameraY = stack[0].y - 200;
  setTimeout(() => { endingScroll = false; endGame(); }, 2000);
}

function draw3DBlock(x, y, w, h, baseHue, rot = 0) {
  ctx.save();
  ctx.translate(x + w / 2, y - cameraY + h / 2);
  ctx.rotate(rot);
  ctx.fillStyle = `hsl(${baseHue},100%,50%)`;
  ctx.fillRect(-w / 2, -h / 2, w, h);
  ctx.fillStyle = `hsl(${baseHue},100%,30%)`;
  ctx.beginPath();
  ctx.moveTo(w / 2, -h / 2); ctx.lineTo(w / 2 + DEPTH, -h / 2 - DEPTH);
  ctx.lineTo(w / 2 + DEPTH, -h / 2 - DEPTH + h); ctx.lineTo(w / 2, h / 2);
  ctx.fill();
  ctx.fillStyle = `hsl(${baseHue},100%,70%)`;
  ctx.beginPath();
  ctx.moveTo(-w / 2, -h / 2); ctx.lineTo(-w / 2 + DEPTH, -h / 2 - DEPTH);
  ctx.lineTo(w / 2 + DEPTH, -h / 2 - DEPTH); ctx.lineTo(w / 2, -h / 2);
  ctx.fill();
  ctx.restore();
}

function endGame() {
  const currentAcc = accuracyList.length > 0 ? (accuracyList.reduce((a, b) => a + b, 0) / accuracyList.length) : 0;
  sessionScores.push(score);
  sessionAccuracies.push(currentAcc);
  const avgScore = sessionScores.reduce((a, b) => a + b, 0) / sessionScores.length;
  const avgAcc = sessionAccuracies.length ? (sessionAccuracies.reduce((a, b) => a + b, 0) / sessionAccuracies.length) : 0;
  let high = localStorage.getItem("hitbitHigh") || 0;
  if (score > high) {
    localStorage.setItem("hitbitHigh", score);
    high = score;
  }
  document.getElementById("endScreen").style.display = "flex";
  document.getElementById("stats").innerHTML = `
    Score: <span class="stat-highlight">${score}</span><br>
    Highscore: <span class="stat-highlight">${high}</span><br>
    Accuracy: <span class="stat-highlight">${(currentAcc * 100).toFixed(1)}%</span><br>
    <hr style="border:0; border-top:1px solid rgba(0,255,102,0.2); margin: 10px 0;">
    Average Score: <span class="stat-highlight">${avgScore.toFixed(1)}</span><br>
    Average Accuracy: <span class="stat-highlight">${(avgAcc * 100).toFixed(1)}%</span>
  `;

  window.HitBitGlobal?.submitScore({
    game: "stack",
    score,
    stats: {
      height: stack.length * FEET_PER_BLOCK,
      avgAccuracy: Number((currentAcc * 100).toFixed(2)),
      perfectPlacements,
      misses: failedDrops,
      livesLost: Math.max(0, 3 - lives),
      durationMs: Math.max(0, Date.now() - runStartedAt),
      eventLog: runEventLog
    }
  });
}

function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  const dt = Math.min(0.1, (timestamp - lastTime) / 1000); 
  lastTime = timestamp;

  if (!gameOver && !endingScroll) {
    // RETAINED FIX: Clean movement logic to prevent jitter
    current.x += speed * direction * dt * 60;
    
    if (direction === 1 && current.x + current.w >= WIDTH) {
      current.x = WIDTH - current.w;
      direction = -1;
    } else if (direction === -1 && current.x <= 0) {
      current.x = 0;
      direction = 1;
    }
    targetCameraY = stack[stack.length - 1].y - 400;
  }

  cameraY += (targetCameraY - cameraY) * (endingScroll ? 0.02 : 0.1) * dt * 60;
  zoom += (Math.max(0.6, 1 - (stack.length) * 0.02) - zoom) * 0.08 * dt * 60;

  ctx.clearRect(0, 0, WIDTH, HEIGHT);
  ctx.save();
  ctx.translate(WIDTH / 2, HEIGHT / 2); ctx.scale(zoom, zoom); ctx.translate(-WIDTH / 2, -HEIGHT / 2);
  
  stack.forEach(b => draw3DBlock(b.x, b.y, b.w, b.h, b.hue));
  
  // RETAINED FIX: Correct gravity logic for falling pieces
  for (let i = fallingBlocks.length - 1; i >= 0; i--) {
    let b = fallingBlocks[i];
    b.y += b.vy * dt * 60; 
    b.vy += 0.4 * dt * 60; 
    b.rot += b.vr * dt * 60;
    draw3DBlock(b.x, b.y, b.w, b.h, b.hue, b.rot);
    if (b.y > HEIGHT + 200) fallingBlocks.splice(i, 1);
  }

  if (!gameOver) draw3DBlock(current.x, current.y, current.w, current.h, current.hue);
  ctx.restore();

  animationId = requestAnimationFrame(loop);
}

window.addEventListener("keydown", e => { if (e.code === "Space") drop(); });
window.addEventListener("mousedown", (e) => {
  if(e.button === 0) drop();
});
window.addEventListener("touchstart", (e) => {
  if (e.target.closest("button") || e.target.closest("a")) return;
  e.preventDefault();
  drop();
}, { passive: false });
</script>

</body>
</html>
