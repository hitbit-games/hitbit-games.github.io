<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Block direct access - must be loaded inside an iframe from the same origin
    if (window.self === window.top) {
      document.documentElement.innerHTML = '';
      window.location.replace('/');
    }
  </script>
  <script>
    // Safe localStorage shim for sandboxed iframe
    (function() {
      var _mem = {};
      try {
        localStorage.setItem('__hb_test__', '1');
        localStorage.removeItem('__hb_test__');
      } catch(e) {
        // localStorage blocked by sandbox - use in-memory fallback
        window.localStorage = {
          getItem:    function(k)    { return _mem.hasOwnProperty(k) ? _mem[k] : null; },
          setItem:    function(k, v) { _mem[k] = String(v); },
          removeItem: function(k)    { delete _mem[k]; },
          clear:      function()     { _mem = {}; }
        };
      }
    })();
  </script>
  <style>
    /* Inside sandboxed iframe: toolbar is handled by shell, so height = 0 here */
    :root { --hb-toolbar-height: 0px; }
    body { padding-top: 0 !important; margin-top: 0 !important; }
  </style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HitBit Memory</title>


<style>
/* GLOBAL / FONT */
body {
  background: #050505;
  color: white;
  font-family: "Highway Gothic", "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: calc(var(--hb-toolbar-height) + 18px);
  user-select: none;
}

/* HITBIT HOME BUTTON */
#homeBtn {
  position: fixed;
  top: 20px;
  left: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  z-index: 999;
  text-decoration: none;
  color: white;
  font-weight: 700;
  font-size: 1rem;
  padding: 8px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  transition: 0.2s;
}
#homeBtn:hover {
  background: rgba(255,255,255,0.12);
  transform: scale(1.05);
}
#homeBtn img {
  width: 22px;
  height: 22px;
  border-radius: 4px;
}

/* START SCREEN */
#startScreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 900;
  text-align: center;
}
#startScreen h1 {
  font-size: 3rem;
  margin-bottom: 20px;
  font-weight: 800;
}
#startScreen p {
  color: #94a3b8;
  margin-bottom: 30px;
  font-size: 1.1rem;
}
#startBtn {
  padding: 14px 32px;
  border-radius: 12px;
  border: none;
  background: #00ff88;
  color: #000;
  font-weight: 800;
  font-size: 1.1rem;
  cursor: pointer;
}
#startBtn:hover {
  filter: brightness(1.1);
}

/* GAME GRID */
#grid {
  display: grid;
  grid-template-columns: repeat(3, 110px);
  grid-template-rows: repeat(3, 110px);
  gap: 14px;
  margin-top: 40px;
}
.tile {
  width: 110px;
  height: 110px;
  border-radius: 16px;
  background: #0a0a0a;
  border: 2px solid #1a1a1a;
  transition: 0.2s;
  box-shadow: 0 0 0px transparent;
}
.tile.active {
  transform: scale(1.06);
  box-shadow: 0 0 25px var(--glow);
}

#status {
  margin-top: 30px;
  font-size: 1.2rem;
  color: #94a3b8;
}

/* RESULTS OVERLAY */
#resultsOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 950;
  text-align: center;
  opacity: 0;
  transition: opacity 0.5s ease;
  --rankColor: #00ff88;
}
#resultsOverlay.show {
  display: flex;
  opacity: 1;
}
#resultsOverlay h2 {
  font-size: 2.4rem;
  margin-bottom: 20px;
  font-weight: 800;
}
#resultsOverlay h2 span {
  text-shadow: 0 0 12px var(--rankColor);
}

/* RANK LADDER WITH INNER PROGRESS (A1) */
#rankBarContainer {
  width: 90%;
  max-width: 480px;
  margin-bottom: 25px;
  text-align: center;
}

#rankScoreText {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 6px;
  color: white;
}

#rankLabelMain {
  font-size: 1rem;
  margin-bottom: 10px;
  font-weight: 700;
  color: white;
  text-shadow: 0 0 10px var(--rankColor);
}

#rankBar {
  width: 100%;
  height: 24px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  display: flex;
  gap: 4px;
}

/* ghosted base segment: thin outline only */
.rankSegment {
  flex: 1;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  opacity: 0.35;
  position: relative;
  overflow: hidden;
  transition: opacity 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
}

/* inner progress bar (A1 style: solid bar) */
.rankProgress {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 0%;
  background: transparent;
  transition: width 0.25s ease;
}

/* completed / active segments */
.rankSegment.completed,
.rankSegment.active {
  opacity: 1;
}

/* RESULTS LADDER LABELS */
#rankLabels {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  margin-top: 6px;
  color: #cbd5e1;
}

/* RESULTS BOX */
.resultBox {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 20px 30px;
  border-radius: 16px;
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
}
.resultBox p {
  margin: 6px 0;
  font-size: 1.1rem;
  color: #cbd5e1;
}

/* BUTTONS */
button {
  margin-top: 20px;
  padding: 12px 26px;
  border-radius: 12px;
  border: none;
  background: #00ff88;
  color: #000;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
}
button:hover {
  filter: brightness(1.1);
}
</style>

  <script>
    // HitBit postMessage shim - replaces HitBitGlobal inside sandboxed iframe
    window.HitBitGlobal = {
      startSession: function(game) {
        window.parent.postMessage({ type: 'HB_START_SESSION', game: game }, '*');
      },
      submitScore: function(payload) {
        window.parent.postMessage({ type: 'HB_SUBMIT_SCORE', payload: payload }, '*');
      }
    };
  </script>
  <style>
    /* Mobile touch fix - prevent browser scroll hijacking game taps */
    canvas, #gameContainer, #game, #titleScreen, #startScreen, #gameover, #overlay {
      touch-action: none;
    }
    body {
      touch-action: none;
      overscroll-behavior: none;
    }
  </style>
</head>
<body>

<!-- HITBIT HOME BUTTON -->
<a id="homeBtn" href="#" onclick="window.parent.postMessage({type:'HB_NAVIGATE',url:'/'},'*');return false;">
  <img src="/favicon.ico?v=3">
  HitBit
</a>

<!-- START SCREEN -->
<div id="startScreen">
  <h1>HitBit Memory</h1>
  <p>Repeat the glowing pattern on the 3×3 neon grid.</p>
  <button id="startBtn" onclick="begin()">Start</button>
</div>

<h1>HitBit Memory</h1>

<div id="grid"></div>

<div id="status"></div>

<!-- RESULTS OVERLAY -->
<div id="resultsOverlay">
  <h2>Results</h2>

  <!-- RANK LADDER -->
  <div id="rankBarContainer">
    <div id="rankScoreText"></div>
    <div id="rankLabelMain"></div>

    <div id="rankBar">
      <div class="rankSegment rankBronze">
        <div class="rankProgress"></div>
      </div>
      <div class="rankSegment rankSilver">
        <div class="rankProgress"></div>
      </div>
      <div class="rankSegment rankGold">
        <div class="rankProgress"></div>
      </div>
      <div class="rankSegment rankDiamond">
        <div class="rankProgress"></div>
      </div>
      <div class="rankSegment rankObsidian">
        <div class="rankProgress"></div>
      </div>
      <div class="rankSegment rankMythic">
        <div class="rankProgress"></div>
      </div>
    </div>

    <div id="rankLabels">
      <span>Bronze</span>
      <span>Silver</span>
      <span>Gold</span>
      <span>Diamond</span>
      <span>Obsidian</span>
      <span>Mythic</span>
    </div>
  </div>

  <div class="resultBox">
    <p id="lastScore"></p>
    <p id="highScore"></p>
    <p id="avgScore"></p>
    <p id="roundsPlayed"></p>
  </div>

  <canvas id="scoreGraph" width="320" height="140" style="margin-top:20px;"></canvas>

  <button onclick="startGame()">Play Again</button>
</div>

<script>
// TILE COLORS
const tileColors = [
  "#00ff88", "#00c8ff", "#b400ff",
  "#ffe066", "#00ffaa", "#ff66ff",
  "#66aaff", "#ff3b3b", "#ff9f1c"
];

// TILE GLOW COLORS
const glowColors = [
  "rgba(0,255,136,0.8)", "rgba(0,200,255,0.8)", "rgba(180,0,255,0.8)",
  "rgba(255,224,102,0.8)", "rgba(0,255,170,0.8)", "rgba(255,102,255,0.8)",
  "rgba(102,170,255,0.8)", "rgba(255,59,59,0.8)", "rgba(255,159,28,0.8)"
];

// SOUND FREQUENCIES
const freqs = [880, 780, 660, 600, 520, 440, 400, 360, 300];

// RANK DEFINITIONS (with GOLD added)
const rankDefs = [
  { name: "BRONZE",   color: "#cd7f32" },
  { name: "SILVER",   color: "#cbd5e1" },
  { name: "GOLD",     color: "#ffd700" },
  { name: "DIAMOND",  color: "#00e1ff" },
  { name: "OBSIDIAN", color: "#4b0082" },
  { name: "MYTHIC",   color: "#b400ff" }
];

let sequence = [];
let playerIndex = 0;
let round = 1;
let acceptingInput = false;
let correctInputs = 0;
let wrongInputs = 0;
let runStartedAt = 0;
let runEventLog = "";

// SCORE STORAGE
let scores = JSON.parse(localStorage.getItem("memoryScores") || "[]");

// AUDIO
const audio = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, duration = 180) {
  const osc = audio.createOscillator();
  const gain = audio.createGain();
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audio.destination);
  gain.gain.setValueAtTime(0.2, audio.currentTime);
  osc.start();
  setTimeout(() => {
    gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.1);
    osc.stop(audio.currentTime + 0.1);
  }, duration);
}

// BUILD GRID
const grid = document.getElementById("grid");
for (let i = 0; i < 9; i++) {
  const tile = document.createElement("div");
  tile.classList.add("tile");
  tile.dataset.index = i;
  tile.style.setProperty("--glow", glowColors[i]);
  tile.addEventListener("click", () => handlePlayerInput(i));
  grid.appendChild(tile);
}
const tiles = document.querySelectorAll(".tile");

// FLASH TILE
function flashTile(i) {
  const tile = tiles[i];
  tile.classList.add("active");
  tile.style.background = tileColors[i];
  playTone(freqs[i]);
  setTimeout(() => {
    tile.classList.remove("active");
    tile.style.background = "#0a0a0a";
  }, 250);
}

// PLAY SEQUENCE
async function playSequence() {
  acceptingInput = false;
  document.getElementById("status").textContent = "Watch the pattern…";
  for (let i = 0; i < sequence.length; i++) {
    await new Promise(res => setTimeout(res, 500));
    flashTile(sequence[i]);
  }
  acceptingInput = true;
  document.getElementById("status").textContent = "Your turn!";
}

// START SCREEN
function begin() {
  document.getElementById("startScreen").style.display = "none";
  startGame();
}

// START GAME
function startGame() {
  sequence = [];
  round = 1;
  playerIndex = 0;
  correctInputs = 0;
  wrongInputs = 0;
  runStartedAt = Date.now();
  runEventLog = "";
  window.HitBitGlobal?.startSession("memory");
  document.getElementById("resultsOverlay").classList.remove("show");
  document.getElementById("status").textContent = "Watch the pattern…";
  nextRound();
}

// NEXT ROUND
function nextRound() {
  sequence.push(Math.floor(Math.random() * 9));
  playerIndex = 0;
  playSequence();
}

// PLAYER INPUT
function handlePlayerInput(i) {
  if (!acceptingInput) return;
  flashTile(i);
  if (i !== sequence[playerIndex]) {
    wrongInputs++;
    runEventLog += "W";
    return gameOver();
  }
  correctInputs++;
  runEventLog += "C";
  playerIndex++;
  if (playerIndex === sequence.length) {
    round++;
    document.getElementById("status").textContent = "Round Complete!";
    setTimeout(nextRound, 800);
  }
}

// RANK INFO (with 5 rounds per rank)
function getRankInfo(r) {
  if (r < 0) r = 0;
  let idx = Math.floor(r / 5);
  if (idx < 0) idx = 0;
  if (idx >= rankDefs.length) idx = rankDefs.length - 1;

  const rank = rankDefs[idx];
  const rankStart = idx * 5;
  let progress = (r - rankStart) / 5;
  if (idx === rankDefs.length - 1 && r >= rankStart) {
    // Mythic: clamp but allow full
    progress = Math.min(1, Math.max(0, progress));
  } else {
    progress = Math.min(1, Math.max(0, progress));
  }

  return { index: idx, rank, progress };
}

// SCORE GRAPH
function drawGraph() {
  const canvas = document.getElementById("scoreGraph");
  const ctx = canvas.getContext("2d");
  if (!scores.length) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    return;
  }
  const recent = scores.slice(-20);
  const maxVal = Math.max(...recent, 10);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = "#00ff88";
  ctx.lineWidth = 3;
  ctx.beginPath();
  recent.forEach((val, i) => {
    const x = recent.length === 1
      ? canvas.width / 2
      : (i / (recent.length - 1)) * (canvas.width - 20) + 10;
    const y = canvas.height - (val / maxVal) * (canvas.height - 20) - 10;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
  recent.forEach((val, i) => {
    const x = recent.length === 1
      ? canvas.width / 2
      : (i / (recent.length - 1)) * (canvas.width - 20) + 10;
    const y = canvas.height - (val / maxVal) * (canvas.height - 20) - 10;
    ctx.fillStyle = "#00ff88";
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  });
}

// GAME OVER
function gameOver() {
  acceptingInput = false;

  const last = round;
  scores.push(last);
  localStorage.setItem("memoryScores", JSON.stringify(scores));

  const high = Math.max(...scores);
  const avg = Math.round(scores.reduce((a,b)=>a+b,0) / scores.length);
  const info = getRankInfo(last);
  const rank = info.rank;

  document.getElementById("lastScore").textContent = `Last Score: Round ${last}`;
  document.getElementById("highScore").textContent = `High Score: Round ${high}`;
  document.getElementById("avgScore").textContent = `Average Score: Round ${avg}`;
  document.getElementById("roundsPlayed").textContent = `Total Runs: ${scores.length}`;

  document.getElementById("rankScoreText").textContent = `You got: ${last} rounds`;
  document.getElementById("rankLabelMain").textContent = rank.name;

  document.getElementById("resultsOverlay").style.setProperty("--rankColor", rank.color);
  document.getElementById("resultsOverlay").querySelector("h2").innerHTML =
    `Results — <span style="color:${rank.color}">${rank.name}</span>`;

  // Update ladder segments
  const segments = document.querySelectorAll(".rankSegment");
  segments.forEach((seg, i) => {
    const progressBar = seg.querySelector(".rankProgress");
    const def = rankDefs[i];

    seg.classList.remove("completed", "active");
    seg.style.borderColor = "rgba(255,255,255,0.25)";
    seg.style.boxShadow = "none";
    progressBar.style.width = "0%";
    progressBar.style.background = def.color;

    if (i < info.index) {
      // previous ranks: fully completed
      seg.classList.add("completed");
      seg.style.borderColor = def.color;
      seg.style.boxShadow = `0 0 10px ${def.color}`;
      progressBar.style.width = "100%";
    } else if (i === info.index) {
      // current rank: partial fill
      seg.classList.add("active");
      seg.style.borderColor = def.color;
      seg.style.boxShadow = `0 0 10px ${def.color}`;
      progressBar.style.width = `${info.progress * 100}%`;
    }
    // future ranks stay ghosted
  });

  drawGraph();
  document.getElementById("resultsOverlay").classList.add("show");

  window.HitBitGlobal?.submitScore({
    game: "memory",
    score: last,
    stats: {
      roundReached: last,
      correctInputs,
      wrongInputs,
      sequenceLength: sequence.length,
      durationMs: Math.max(0, Date.now() - runStartedAt),
      eventLog: runEventLog
    }
  });
}
</script>


</body>
</html>
