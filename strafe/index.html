<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Block direct access - must be loaded inside an iframe from the same origin
    if (window.self === window.top) {
      document.documentElement.innerHTML = '';
      window.location.replace('/');
    }
  </script>
  <script>
    // Safe localStorage shim for sandboxed iframe
    (function() {
      var _mem = {};
      try {
        localStorage.setItem('__hb_test__', '1');
        localStorage.removeItem('__hb_test__');
      } catch(e) {
        // localStorage blocked by sandbox - use in-memory fallback
        window.localStorage = {
          getItem:    function(k)    { return _mem.hasOwnProperty(k) ? _mem[k] : null; },
          setItem:    function(k, v) { _mem[k] = String(v); },
          removeItem: function(k)    { delete _mem[k]; },
          clear:      function()     { _mem = {}; }
        };
      }
    })();
  </script>
  <style>
    /* Inside sandboxed iframe: toolbar is handled by shell, so height = 0 here */
    :root { --hb-toolbar-height: 0px; }
    body { padding-top: 0 !important; margin-top: 0 !important; }
  </style>
<meta charset="UTF-8">
<title>HitBit Strafe</title>

<link rel="icon" type="image/x-icon" href="/favicon.ico?v=3">


<style>
    body {
        margin: 0;
        background: #05070a;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: #ffffff;
        user-select: none;
    }

    canvas { display: block; }

    #titleButton {
        position: fixed;
        top: 10px;
        left: 10px;
        font-size: 32px;
        font-weight: bold;
        color: #00ffcc;
        cursor: pointer;
        z-index: 60;
        text-shadow: 0 0 12px #00ffcc;
    }

    #titleButton:hover {
        color: #66ffee;
    }

    #startScreen {
        position: fixed;
        top: var(--hb-toolbar-height); left: 0;
        width: 100%; height: calc(100% - var(--hb-toolbar-height));
        background: rgba(0,0,0,0.85);
        display: flex; align-items: center; justify-content: center;
        flex-direction: column;
        z-index: 50;
        cursor: pointer;
        text-align: center;
    }

    #startScreen h1 {
        font-size: 48px;
        color: #00ffcc;
        text-shadow: 0 0 20px #00ffcc;
        margin-bottom: 20px;
    }

    #startScreen p {
        font-size: 22px;
        color: #cccccc;
        margin: 6px 0;
    }

    #hud {
        position: fixed;
        top: 10px;
        right: 20px;
        z-index: 20;
        font-size: 22px;
        font-weight: bold;
        color: #00ffcc;
        text-shadow: 0 0 10px #00ffcc;
        text-align: right;
    }

    #graphCanvas {
        position: fixed;
        top: 55%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 55;
        border: 2px solid #00ffcc55;
        background: rgba(0, 20, 20, 0.35);
        border-radius: 6px;
        display: none;
        pointer-events: none;
    }

    body.desktop-cursor { cursor: none; }

    #crosshair {
        position: fixed;
        width: 20px; height: 20px;
        pointer-events: none;
        z-index: 9999;
        display: none;
    }

    #crosshair .hline, #crosshair .vline {
        position: absolute;
        background: white;
    }

    #crosshair .hline {
        top: 50%; left: 0;
        width: 100%; height: 2px;
        transform: translateY(-1px);
    }

    #crosshair .vline {
        left: 50%; top: 0;
        width: 2px; height: 100%;
        transform: translateX(-1px);
    }

    #healthbar {
        position: fixed;
        width: 60px;
        height: 8px;
        border: 2px solid #00ff44;
        border-radius: 6px;
        overflow: hidden;
        background: #002211;
        z-index: 30;
        display: none;
    }

    #healthfill {
        height: 100%;
        width: 100%;
        background: #00ff44;
        transition: width 0.1s linear;
    }
</style>

  <script>
    // HitBit postMessage shim - replaces HitBitGlobal inside sandboxed iframe
    window.HitBitGlobal = {
      startSession: function(game) {
        window.parent.postMessage({ type: 'HB_START_SESSION', game: game }, '*');
      },
      submitScore: function(payload) {
        window.parent.postMessage({ type: 'HB_SUBMIT_SCORE', payload: payload }, '*');
      }
    };
  </script>
  <style>
    /* Mobile touch fix - prevent browser scroll hijacking game taps */
    canvas, #gameContainer, #game, #titleScreen, #startScreen, #gameover, #overlay {
      touch-action: none;
    }
    body {
      touch-action: none;
      overscroll-behavior: none;
    }
  </style>
</head>
<body>

<div id="titleButton">HitBit</div>

<div id="startScreen">
    <h1>HitBit Strafe</h1>
    <p>Track the orb with your crosshair</p>
    <p>Click to start</p>
</div>

<div id="hud">
    <div id="score">Score: 0 | Accuracy: 0%</div>
    <div id="timer">Time: 60</div>
</div>

<canvas id="graphCanvas"></canvas>

<div id="healthbar"><div id="healthfill"></div></div>

<div id="crosshair">
    <div class="hline"></div>
    <div class="vline"></div>
</div>

<canvas id="game"></canvas>

<script>
document.getElementById("titleButton").onclick = () => {
    window.parent.postMessage({type:'HB_NAVIGATE',url:'/'},'*');
};

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const graphCanvas = document.getElementById("graphCanvas");
const graphCtx = graphCanvas.getContext("2d");

function resizeCanvas(){
    const toolbarHeight = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--hb-toolbar-height"), 10) || 0;
    canvas.width = innerWidth;
    canvas.height = Math.max(320, innerHeight - toolbarHeight);

    graphCanvas.width = Math.floor(innerWidth * 0.20);
    graphCanvas.height = Math.floor((innerHeight - toolbarHeight) * 0.10);
}
addEventListener("resize", resizeCanvas);
resizeCanvas();

const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
const crosshair = document.getElementById("crosshair");
if(!isMobile) document.body.classList.add("desktop-cursor");

const mouse = { x: innerWidth/2, y: innerHeight/2 };
addEventListener("mousemove", e=>{
    if(!gameRunning && !startPressed) return;
    mouse.x = e.clientX; mouse.y = e.clientY;
    if(!isMobile && crosshair.style.display!=="none"){
        crosshair.style.left = (e.clientX-10)+"px";
        crosshair.style.top  = (e.clientY-10)+"px";
    }
});

const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");
const startScreen = document.getElementById("startScreen");
const healthbar = document.getElementById("healthbar");
const healthfill = document.getElementById("healthfill");

let score=0, timeLeft=60, gameRunning=false, startPressed=false;

let totalTimeOnTarget = 0;
let totalTimeTracked  = 0;
let accuracyHistory = [];
let runStartedAt = 0;

let highScore = Number(localStorage.getItem("hitbit_strafe_hs") || 0);
let bestAccuracy = Number(localStorage.getItem("hitbit_bestaccuracy") || 0);

const ball = {
    x: innerWidth/2, y: innerHeight/2,
    vx:0, vy:0,
    radius:35,
    color:"#66ccff",
    health:1,

    strafeDirX:null,
    strafeDirY:null,
    strafeFlipCooldown:0,
    strafeBurst:0,
    strafePause:0
};

const friction = 0.99;
const maxSpeed = 5;
const wanderStrength = 0.1;

function resetBall(){
    ball.x = innerWidth/2;
    ball.y = innerHeight/2;
    ball.vx = (Math.random()*2-1)*1.2;
    ball.vy = (Math.random()*2-1)*1.2;
    ball.health = 1;

    ball.strafeDirX = null;
    ball.strafeDirY = null;
    ball.strafeFlipCooldown = 0;
    ball.strafeBurst = 0;
    ball.strafePause = 0;
}

function drawGraph(){
    graphCtx.clearRect(0,0,graphCanvas.width,graphCanvas.height);

    if(accuracyHistory.length < 2) return;

    graphCtx.strokeStyle = "#00ffcc";
    graphCtx.lineWidth = 2;
    graphCtx.beginPath();

    for(let i=0; i<accuracyHistory.length; i++){
        let x = (i / (accuracyHistory.length - 1)) * graphCanvas.width;
        let y = graphCanvas.height - (accuracyHistory[i] / 100) * graphCanvas.height;

        if(i === 0) graphCtx.moveTo(x, y);
        else graphCtx.lineTo(x, y);
    }

    graphCtx.stroke();
}

function update(dt){
    if(!gameRunning) return;

    totalTimeTracked += dt;

    ball.vx += (Math.random()-0.5)*wanderStrength*dt;
    ball.vy += (Math.random()-0.5)*wanderStrength*dt;

    ball.x += ball.vx*dt;
    ball.y += ball.vy*dt;

    const wallMargin = 140;
    const wallForce = 0.55;

    if(ball.x < wallMargin){ ball.vx += wallForce*dt; if(ball.strafeDirX === -1) ball.strafeDirX = 1; }
    if(ball.x > innerWidth-wallMargin){ ball.vx -= wallForce*dt; if(ball.strafeDirX === 1) ball.strafeDirX = -1; }
    if(ball.y < wallMargin){ ball.vy += wallForce*dt; if(ball.strafeDirY === -1) ball.strafeDirY = 1; }
    if(ball.y > innerHeight-wallMargin){ ball.vy -= wallForce*dt; if(ball.strafeDirY === 1) ball.strafeDirY = -1; }

    const dx = mouse.x-ball.x;
    const dy = mouse.y-ball.y;
    const dist = Math.sqrt(dx*dx+dy*dy);

    if(!isMobile && dist < ball.radius){

        totalTimeOnTarget += dt;

        if(ball.strafeDirX===null) ball.strafeDirX = Math.random()<0.5?1:-1;
        if(ball.strafeDirY===null) ball.strafeDirY = Math.random()<0.5?1:-1;

        if(ball.strafeFlipCooldown>0) ball.strafeFlipCooldown--;

        if(ball.strafeFlipCooldown===0 && Math.random()<0.25){
            const flipType = Math.random();
            if(flipType<0.3) ball.strafeDirX*=-1;
            else if(flipType<0.6) ball.strafeDirY*=-1;
            else { ball.strafeDirX*=-1; ball.strafeDirY*=-1; }
            ball.strafeFlipCooldown = 5;
        }

        if(!ball.strafePause && Math.random()<0.01) ball.strafePause=3;

        if(ball.strafePause>0){
            ball.strafePause--;
        } else {
            if(!ball.strafeBurst && Math.random()<0.2) ball.strafeBurst=12;
            let force = ball.strafeBurst>0 ? 1.2 : 0.6;
            if(ball.strafeBurst>0) ball.strafeBurst--;

            ball.vx += ball.strafeDirX * force * dt;
            ball.vy += ball.strafeDirY * force * dt;

            ball.vx += (Math.random()-0.5)*0.5*dt;
            ball.vy += (Math.random()-0.5)*0.5*dt;
        }

        ball.health -= dt/120;
        if(ball.health<0) ball.health=0;

    } else {
        ball.health += dt/300;
        if(ball.health>1) ball.health=1;
    }

    healthbar.style.left = (ball.x-30)+"px";
    healthbar.style.top  = (ball.y+ball.radius+12)+"px";
    healthfill.style.width = (ball.health*100)+"%";
    healthbar.style.display="block";

    if(ball.health<=0){
        score++;
        resetBall();
    }

    let accuracy = totalTimeTracked > 0
        ? Math.round((totalTimeOnTarget / totalTimeTracked) * 100)
        : 0;

    scoreEl.textContent = `Score: ${score} | Accuracy: ${accuracy}%`;

    accuracyHistory.push(accuracy);
    if(accuracyHistory.length > 600) accuracyHistory.shift();

    ball.vx*=friction;
    ball.vy*=friction;

    const speed = Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
    if(speed>maxSpeed){
        ball.vx = (ball.vx/speed)*maxSpeed;
        ball.vy = (ball.vy/speed)*maxSpeed;
    }
}

function drawBall(){
    ctx.beginPath();
    ctx.fillStyle=ball.color;
    ctx.shadowBlur=20;
    ctx.shadowColor=ball.color;
    ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;

    const grad = ctx.createRadialGradient(
        ball.x-ball.radius*0.3,
        ball.y-ball.radius*0.3,
        ball.radius*0.1,
        ball.x,ball.y,ball.radius
    );
    grad.addColorStop(0,"rgba(255,255,255,0.9)");
    grad.addColorStop(1,"rgba(102,204,255,0)");
    ctx.fillStyle=grad;
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);
    ctx.fill();
}

let lastTime = performance.now();
function loop(){
    const now = performance.now();
    let dt = (now-lastTime)/16.666;
    lastTime=now;
    if(dt<=0) dt=1;
    if(dt>3) dt=3;

    ctx.clearRect(0,0,innerWidth,innerHeight);
    update(dt);
    drawBall();
    requestAnimationFrame(loop);
}
loop();

function startTimer(){
    const interval=setInterval(()=>{
        if(!gameRunning) return clearInterval(interval);
        timeLeft--;
        timerEl.textContent="Time: "+timeLeft;

        if(timeLeft<=0){
            gameRunning=false;
            timerEl.textContent="Time: 0";
            crosshair.style.display="none";

            let accuracy = totalTimeTracked > 0
                ? Math.round((totalTimeOnTarget / totalTimeTracked) * 100)
                : 0;

            if(score > highScore){
                highScore = score;
                localStorage.setItem("hitbit_strafe_hs", highScore);
            }

            if(accuracy > bestAccuracy){
                bestAccuracy = accuracy;
                localStorage.setItem("hitbit_bestaccuracy", bestAccuracy);
            }

            startScreen.style.display="flex";
            startScreen.innerHTML = `
                <h1>RESULTS</h1>
                <p>Score: ${score}</p>
                <p>Accuracy: ${accuracy}%</p>
                <p>Best Accuracy: ${bestAccuracy}%</p>
                <p>High Score: ${highScore}</p>
                <p>Click to Restart</p>
            `;

            graphCanvas.style.display = "block";
            drawGraph();

            window.HitBitGlobal?.submitScore({
                game: "strafe",
                score,
                stats: {
                    accuracy,
                    kills: score,
                    totalTimeOnTarget: Number(totalTimeOnTarget.toFixed(2)),
                    totalTrackedTime: Number(totalTimeTracked.toFixed(2)),
                    durationMs: Math.max(0, Date.now() - runStartedAt)
                }
            });

            clearInterval(interval);
        }
    },1000);
}

startScreen.addEventListener("touchstart",(e)=>{e.preventDefault();startScreen.dispatchEvent(new MouseEvent('click'));});
startScreen.addEventListener("click",()=>{
    startPressed=true;
    startScreen.style.display="none";
    graphCanvas.style.display = "none";

    if(!isMobile) crosshair.style.display="block";

    score=0;
    timeLeft=60;

    totalTimeOnTarget = 0;
    totalTimeTracked  = 0;
    accuracyHistory = [];
    runStartedAt = Date.now();
    window.HitBitGlobal?.startSession("strafe");

    scoreEl.textContent="Score: 0 | Accuracy: 0%";
    timerEl.textContent="Time: 60";

    resetBall();
    gameRunning=true;
    startTimer();
});
</script>

</body>
</html>
